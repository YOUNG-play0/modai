<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODAI — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --black: #080808;
  --dark: #0F0F0F;
  --card: #141414;
  --border: #222;
  --text: #E8E2D9;
  --muted: #6A6058;
}
body {
  background: var(--black);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 300;
  letter-spacing: 8px;
  color: var(--gold);
  margin-bottom: 48px;
}
.logo span { color: var(--text); font-weight: 600; }
.auth-card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 48px;
  width: 100%;
  max-width: 420px;
}
.auth-tabs {
  display: flex;
  margin-bottom: 36px;
  border-bottom: 1px solid var(--border);
}
.auth-tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.2s;
}
.auth-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.form-group { margin-bottom: 20px; }
label {
  display: block;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
input {
  width: 100%;
  background: var(--dark);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--gold); }
.btn-auth {
  width: 100%;
  background: var(--gold);
  color: var(--black);
  border: none;
  padding: 14px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}
.btn-auth:hover { background: var(--gold-light); }
.btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg {
  background: rgba(255,80,80,0.1);
  border: 1px solid rgba(255,80,80,0.3);
  color: #ff6060;
  padding: 10px 14px;
  font-size: 12px;
  margin-bottom: 16px;
  display: none;
}
.success-msg {
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 10px 14px;
  font-size: 12px;
  margin-bottom: 16px;
  display: none;
}
.divider {
  width: 40px;
  height: 1px;
  background: var(--gold);
  margin: 24px auto;
}
.back-link {
  text-align: center;
  margin-top: 24px;
  font-size: 11px;
  color: var(--muted);
}
.back-link a {
  color: var(--gold);
  text-decoration: none;
}
.plan-info {
  background: var(--dark);
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 24px;
  font-size: 11px;
  line-height: 1.8;
  color: var(--muted);
}
.plan-info strong { color: var(--gold); }
</style>
</head>
<body>

<div class="logo">MOD<span>AI</span></div>

<div class="auth-card">
  <div class="auth-tabs">
    <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Connexion</div>
    <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Inscription</div>
  </div>

  <div class="plan-info">
    <strong>Plan Gratuit :</strong> 5 générations/jour<br>
    <strong>Plan Pro (19€/mois) :</strong> Illimité + toutes plateformes
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <!-- LOGIN FORM -->
  <div id="form-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="votre@email.com">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-auth" id="btn-login" onclick="doLogin()">Se connecter</button>
  </div>

  <!-- SIGNUP FORM -->
  <div id="form-signup" style="display:none">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="votre@email.com">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="signup-password" placeholder="Minimum 6 caractères" onkeydown="if(event.key==='Enter')doSignup()">
    </div>
    <button class="btn-auth" id="btn-signup" onclick="doSignup()">Créer mon compte</button>
  </div>

</div>

<div class="back-link">
  <a href="/landing">← Retour à l'accueil</a>
</div>

<script>
// Check URL to show correct tab
if (window.location.pathname === '/signup') switchTab('signup');

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  hideMessages();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
}

function hideMessages() {
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('btn-login');

  if (!email || !password) { showError('Remplissez tous les champs.'); return; }

  btn.disabled = true;
  btn.textContent = 'Connexion...';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.success) {
      showSuccess('Connecté ! Redirection...');
      setTimeout(() => window.location.href = '/', 1000);
    } else {
      showError(data.erreur || 'Erreur de connexion.');
    }
  } catch {
    showError('Erreur serveur. Réessayez.');
  }

  btn.disabled = false;
  btn.textContent = 'Se connecter';
}

async function doSignup() {
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const btn = document.getElementById('btn-signup');

  if (!email || !password) { showError('Remplissez tous les champs.'); return; }
  if (password.length < 6) { showError('Mot de passe trop court (6 caractères minimum).'); return; }

  btn.disabled = true;
  btn.textContent = 'Création...';

  try {
    const res = await fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.success) {
      showSuccess('Compte créé ! Redirection...');
      setTimeout(() => window.location.href = '/', 1000);
    } else {
      showError(data.erreur || 'Erreur création compte.');
    }
  } catch {
    showError('Erreur serveur. Réessayez.');
  }

  btn.disabled = false;
  btn.textContent = 'Créer mon compte';
}
</script>
</body>
</html>
